<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vendor Login — Har Ghar Solar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #005b38 0%, #00a651 50%, #ffc107 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: white; border-radius: 24px;
      padding: 50px 45px; width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
      text-align: center;
    }
    .login-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #005b38, #00a651);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .login-icon i { font-size: 36px; color: white; }
    .login-card h2 { font-weight: 900; color: #005b38; font-size: 26px; }
    .login-card p { color: #666; font-size: 14px; margin-bottom: 30px; }
    .form-control {
      height: 52px; border-radius: 14px;
      border: 2px solid #e0e0e0; padding: 0 18px;
      font-weight: 600; transition: .3s;
    }
    .form-control:focus { border-color: #00a651; box-shadow: none; }
    .input-group-text {
      border-radius: 14px 0 0 14px !important;
      background: #f0f7f4; border: 2px solid #e0e0e0; border-right: none;
      color: #005b38;
    }
    .input-group .form-control { border-radius: 0 14px 14px 0 !important; }
    .btn-login {
      background: linear-gradient(135deg, #005b38, #00a651);
      color: white; border: none; height: 52px; border-radius: 14px;
      font-weight: 800; font-size: 16px; width: 100%;
      transition: .3s; margin-top: 10px;
    }
    .btn-login:hover { opacity: .9; transform: translateY(-1px); color: white; }
    .admin-link { margin-top: 22px; font-size: 13px; color: #888; }
    .admin-link a { color: #005b38; font-weight: 700; text-decoration: none; }
    .alert { border-radius: 12px; font-weight: 600; }
  </style>
  <meta name="robots" content="noindex,nofollow,noarchive">
</head>
<body>
  <div class="login-card">
    <div class="login-icon"><i class="fa-solid fa-user-tie"></i></div>
    <h2>Vendor Portal</h2>
    <p>Har Ghar Solar — Field Vendor Login</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" class="mt-2">
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
        <input type="text" name="username" class="form-control"
               placeholder="Vendor Username" required autocomplete="off">
      </div>
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
        <input type="password" name="password" class="form-control"
               placeholder="Password" required>
      </div>
      <button type="submit" class="btn-login">
        <i class="fa-solid fa-right-to-bracket me-2"></i> Login to Dashboard
      </button>
    </form>

    <div class="admin-link">
      Admin? <a href="/admin-login">Click here</a>
    </div>
  </div>
</body>
</html>
