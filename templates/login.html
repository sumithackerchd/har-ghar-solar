<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — Har Ghar Solar CRM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #003d27 0%, #005B38 45%, #00A651 80%, #ffc107 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif;
      padding: 20px;
    }
    .login-wrap {
      width: 100%; max-width: 440px;
    }
    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 44px 40px;
      box-shadow: 0 32px 80px rgba(0,0,0,.28), 0 0 0 1px rgba(255,255,255,.08);
      text-align: center;
    }
    .login-icon-wrap {
      width: 76px; height: 76px; border-radius: 50%;
      background: linear-gradient(135deg, #005B38, #00A651);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 8px 24px rgba(0,91,56,.35);
    }
    .login-icon-wrap i { font-size: 34px; color: #fff; }
    .login-card h2 {
      font-size: 24px; font-weight: 900; color: #005B38;
      margin-bottom: 4px;
    }
    .login-card p {
      font-size: 13px; color: #888; font-weight: 600;
      margin-bottom: 28px;
    }
    .input-group-text {
      background: #f0f7f4;
      border: 2px solid #e0e0e0; border-right: none;
      border-radius: 14px 0 0 14px !important;
      color: #005B38; font-size: 15px;
      padding: 0 14px;
    }
    .form-control {
      height: 52px;
      border: 2px solid #e0e0e0; border-left: none;
      border-radius: 0 14px 14px 0 !important;
      font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 600;
      color: #1a2332;
      transition: border-color .2s;
    }
    .form-control:focus {
      border-color: #00A651;
      box-shadow: none;
      outline: none;
    }
    .form-control:focus + .input-group-text,
    .input-group:focus-within .input-group-text {
      border-color: #00A651;
    }
    .mb-field { margin-bottom: 14px; }
    .btn-login {
      width: 100%; height: 52px;
      background: linear-gradient(135deg, #005B38, #00A651);
      color: #fff; border: none; border-radius: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px; font-weight: 800;
      cursor: pointer; margin-top: 8px;
      transition: opacity .2s, transform .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { opacity: .9; transform: translateY(-1px); color: #fff; }
    .vendor-link {
      margin-top: 20px; font-size: 13px; color: #999; font-weight: 600;
    }
    .vendor-link a { color: #005B38; font-weight: 800; text-decoration: none; }
    .vendor-link a:hover { text-decoration: underline; }
    .alert {
      border-radius: 12px; font-size: 13px; font-weight: 600;
      padding: 10px 14px; margin-bottom: 16px; text-align: left;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-icon-wrap">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h2>Har Ghar Solar CRM</h2>
      <p>Admin Management Portal</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="input-group mb-field">
          <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="username" class="form-control"
                 placeholder="Admin Username" required autocomplete="off">
        </div>
        <div class="input-group mb-field">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="Password" required>
        </div>
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right"></i> Login to Dashboard
        </button>
      </form>

      <div class="vendor-link">
        Vendor? <a href="/vendor-login">Go to Vendor Portal</a>
      </div>
    </div>
  </div>
</body>
</html>
