<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>403 Forbidden — Har Ghar Solar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .error-card { text-align: center; max-width: 480px; padding: 48px 36px; background: #fff; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,91,56,.12); }
    .error-code { font-size: 96px; font-weight: 900; color: #e53935; line-height: 1; }
    .error-title { font-size: 24px; font-weight: 700; color: #1a2332; margin: 12px 0 8px; }
    .error-msg { color: #5a6474; font-size: 14px; margin-bottom: 28px; }
    .btn-home { background: linear-gradient(135deg, #005B38, #00A651); color: #fff; padding: 12px 32px; border-radius: 12px; font-weight: 700; text-decoration: none; display: inline-block; transition: opacity .2s; }
    .btn-home:hover { opacity: .88; color: #fff; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">403</div>
    <h1 class="error-title">Access Forbidden</h1>
    <p class="error-msg">You don't have permission to access this page. Please contact your administrator if you believe this is an error.</p>
    <a href="/" class="btn-home">← Back to Home</a>
  </div>
</body>
</html>
